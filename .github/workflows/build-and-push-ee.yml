---
name: Build and Push Execution Environment

on:
  push:
    branches:
      - main
    paths:
      - 'execution-environment.yml'
      - 'requirements.yml'
      - 'requirements.txt'
      - 'bindep.txt'
      - 'ansible.cfg'
      - '.github/workflows/build-and-push-ee.yml'
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Tag version for the EE image (e.g., v1.0.0)'
        required: false
        default: 'latest'

env:
  EE_IMAGE_NAME: rhel10-ec2-ee

jobs:
  lint:
    name: Lint Ansible Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-lint
        run: |
          pip install ansible-lint ansible-core

      - name: Run ansible-lint
        run: |
          ansible-lint deploy.yml configure.yml verify.yml site.yml roles/
        continue-on-error: true

  build-and-push:
    name: Build and Push Execution Environment
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-builder
        run: |
          pip install ansible-builder

      - name: Log in to Quay.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Execution Environment
        run: |
          ansible-builder build \
            --tag ${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            --tag ${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.short_sha }} \
            --container-runtime podman \
            -v 3

      - name: Tag for Quay.io
        run: |
          podman tag \
            ${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            quay.io/${{ secrets.QUAY_ORGANIZATION }}/${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          podman tag \
            ${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.short_sha }} \
            quay.io/${{ secrets.QUAY_ORGANIZATION }}/${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.short_sha }}

      - name: Push to Quay.io
        run: |
          podman push quay.io/${{ secrets.QUAY_ORGANIZATION }}/${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          podman push quay.io/${{ secrets.QUAY_ORGANIZATION }}/${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.short_sha }}

      - name: Generate image summary
        run: |
          echo "## Execution Environment Built Successfully :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** quay.io/${{ secrets.QUAY_ORGANIZATION }}/${{ env.EE_IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tag.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "podman pull quay.io/${{ secrets.QUAY_ORGANIZATION }}/${{ env.EE_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
