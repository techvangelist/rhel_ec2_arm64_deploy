---
name: Test Ansible Content

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint

      - name: Run ansible-lint
        run: |
          ansible-lint --version
          ansible-lint deploy.yml configure.yml verify.yml site.yml roles/

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: |
          pip install yamllint

      - name: Run yamllint
        run: |
          yamllint --version
          yamllint .
        continue-on-error: true

  syntax-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible-core

      - name: Install required collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Syntax check playbooks
        run: |
          ansible-playbook --syntax-check deploy.yml
          ansible-playbook --syntax-check configure.yml
          ansible-playbook --syntax-check verify.yml
          ansible-playbook --syntax-check site.yml

  validate-ee-definition:
    name: Validate Execution Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-builder
        run: |
          pip install ansible-builder

      - name: Validate EE definition
        run: |
          ansible-builder create --container-runtime podman -v 3
          echo "Execution Environment definition is valid"
