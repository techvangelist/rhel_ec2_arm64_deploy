---
# Example inventory file
# For dynamic deployment, the deploy role will add hosts to rhel10_instances group

all:
  children:
    rhel10_instances:
      hosts:
        # Uncomment and update with your instance IP after deployment
        # 18.223.210.38:
        #   ansible_user: ec2-user
        #   ansible_ssh_private_key_file: ~/.ssh/your-key.pem
      vars:
        # Common variables for all RHEL 10 instances
        admin_user: asnell
        admin_comment: "Abraham Snell"
