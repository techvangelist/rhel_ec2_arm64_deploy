---
- name: Validate required AWS credentials are set
  ansible.builtin.assert:
    that:
      - aws_access_key is defined
      - aws_access_key | length > 0
      - aws_secret_key is defined
      - aws_secret_key | length > 0
      - ec2_key_name is defined
      - ec2_key_name | length > 0
      - ec2_security_group_ids is defined
      - ec2_security_group_ids | length > 0
    fail_msg: "Required AWS credentials or configuration not set. Check environment variables."

- name: Look up latest RHEL 10 ARM64 AMI
  amazon.aws.ec2_ami_info:
    region: "{{ aws_region }}"
    owners: "{{ ami_owner }}"
    filters:
      name: "{{ ami_name_filter }}"
      architecture: "{{ ami_architecture }}"
      state: available
  register: ami_search_results

- name: Validate AMI was found
  ansible.builtin.assert:
    that:
      - ami_search_results.images | length > 0
    fail_msg: "No RHEL 10 ARM64 AMI found matching filter: {{ ami_name_filter }}"

- name: Select most recent AMI
  ansible.builtin.set_fact:
    selected_ami_id: "{{ ami_search_results.images | sort(attribute='creation_date') | last | community.general.json_query('image_id') }}"

- name: Display selected AMI information
  ansible.builtin.debug:
    msg: "Using AMI: {{ selected_ami_id }} ({{ ami_search_results.images | sort(attribute='creation_date') | last | community.general.json_query('name') }})"

- name: Launch RHEL 10 ARM64 EC2 instance
  amazon.aws.ec2_instance:
    region: "{{ aws_region }}"
    key_name: "{{ ec2_key_name }}"
    instance_type: "{{ ec2_instance_type }}"
    image_id: "{{ selected_ami_id }}"
    security_groups: "{{ ec2_security_group_ids }}"
    network:
      assign_public_ip: true
    vpc_subnet_id: "{{ ec2_subnet_id | default(omit) }}"
    volumes:
      - device_name: /dev/sda1
        ebs:
          volume_size: "{{ ec2_root_volume_size }}"
          volume_type: "{{ ec2_root_volume_type }}"
          delete_on_termination: "{{ ec2_root_delete_on_termination }}"
    tags: "{{ ec2_instance_tags }}"
    wait: "{{ ec2_wait }}"
    wait_timeout: "{{ ec2_wait_timeout }}"
    state: running
  register: ec2_instance

- name: Display instance information
  ansible.builtin.debug:
    msg: |
      Instance ID: {{ ec2_instance.instances[0].instance_id }}
      Public IP: {{ ec2_instance.instances[0].public_ip_address }}
      Private IP: {{ ec2_instance.instances[0].private_ip_address }}
      State: {{ ec2_instance.instances[0].state.name }}

- name: Add instance to inventory
  ansible.builtin.add_host:
    name: "{{ ec2_instance.instances[0].public_ip_address }}"
    groups: rhel10_instances
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "{{ lookup('env', 'AWS_SSH_KEY_PATH') | default('~/.ssh/id_rsa', true) }}"
    instance_id: "{{ ec2_instance.instances[0].instance_id }}"
    instance_name: "{{ ec2_instance_name }}"

- name: Wait for SSH to become available
  ansible.builtin.wait_for:
    host: "{{ ec2_instance.instances[0].public_ip_address }}"
    port: 22
    delay: 10
    timeout: 300
    state: started
  when: ec2_wait

- name: Set deployed instance facts
  ansible.builtin.set_fact:
    deployed_instance_id: "{{ ec2_instance.instances[0].instance_id }}"
    deployed_instance_ip: "{{ ec2_instance.instances[0].public_ip_address }}"
    deployed_instance_private_ip: "{{ ec2_instance.instances[0].private_ip_address }}"
